services:
  postgres:
    image: postgres:16-alpine
    container_name: ethio_videos_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ethio_user
      POSTGRES_PASSWORD: ethio_password
      POSTGRES_DB: ethio_videos

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ethio_user -d ethio_videos"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - ethio_videos_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ethio_videos_pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: jean-pierre.kebede@hotmail.fr
      PGADMIN_DEFAULT_PASSWORD: Ethiopia@191074

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    networks:
      - ethio_videos_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  ethio_videos_network:
    driver: bridge
